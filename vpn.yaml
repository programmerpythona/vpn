port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info

# --- ИНФОРМАЦИЯ О ПОДПИСКЕ (Happ считывает это из заголовков или имен) ---
# Название: MyVipSubscription
# Трафик: 150GB / 500GB
# Поддержка: https://t.me

proxies:
  # Заглушки-информаторы (используем Shadowsocks на локальный адрес)
  - name: "📊 Трафик: 150GB из 500GB"
    type: ss
    server: 127.0.0.1
    port: 80
    cipher: aes-256-gcm
    password: "info"
    
  - name: "🆘 Поддержка: @my_vpn_tg"
    type: ss
    server: 127.0.0.1
    port: 80
    cipher: aes-256-gcm
    password: "help"

  - name: "🌐 Сайт: vpn-support.com"
    type: ss
    server: 127.0.0.1
    port: 80
    cipher: aes-256-gcm
    password: "site"

  # Реальные рабочие серверы
  - name: "🇩🇪 Германия Premium"
    type: vless
    server: ://yourserver.com
    port: 443
    uuid: "твой-uuid-здесь"
    tls: true
    servername: ://yourserver.com
    network: tcp

proxy-groups:
  - name: "🚀 Выбор сервера"
    type: select
    proxies:
      - "🇩🇪 Германия Premium"
      - "📊 Трафик: 150GB из 500GB"
      - "🆘 Поддержка: @my_vpn_tg"

rules:
  - MATCH,🚀 Выбор сервера
